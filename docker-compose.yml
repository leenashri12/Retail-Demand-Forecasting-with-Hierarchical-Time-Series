version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    container_name: m5_forecast_api
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: m5_forecast_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data/processed:/app/data/processed:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    restart: unless-stopped
